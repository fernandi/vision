<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Search</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="FISHING BY NIGHT" autofocus>
            <button id="search-btn" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </header>

    <main id="gallery" class="gallery">
        <!-- Images will be injected here -->
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
        <div class="lightbox-img-wrap">
            <img id="lightbox-img" src="" alt="">
        </div>
        <div class="lightbox-bar">
            <div class="lightbox-meta">
                <div id="lightbox-title"></div>
                <div class="lightbox-sub">
                    <span id="lightbox-author"></span>
                    <span id="lightbox-museum"></span>
                </div>
            </div>
            <a id="lightbox-download" href="" download class="download-btn">DOWNLOAD</a>
        </div>
        <button class="lightbox-close" aria-label="Fermer"></button>
    </div>
    <script src="app.js"></script>
</body>

</html>
