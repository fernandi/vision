<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Visual Search</title>
    <link rel="stylesheet" href="style.css?v=13">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Saved images strip: fixed black bar above header -->
    <div id="saved-panel">
        <div id="saved-thumbs"></div>
    </div>

    <header>
        <div class="search-container" id="search-container">
            <!-- Image chips: populated dynamically when images are dropped -->
            <div id="image-chips-container" class="image-chips-container"></div>
            <input type="text" id="search-input" placeholder="FISHING BY NIGHT" autofocus>
            <button id="search-btn" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>

        <!-- Filter panel: drops from top-right -->
        <div id="filter-panel" class="filter-panel" aria-hidden="true">
            <!-- Diversity toggle -->
            <button id="diversity-toggle" class="diversity-toggle" aria-pressed="false" title="Toggle diversity (MMR)">
                <span class="toggle-track">
                    <span class="toggle-thumb"></span>
                </span>
                <span class="toggle-label">BOOST DIVERSITY</span>
            </button>

            <div class="filter-panel-separator"></div>

            <!-- Combination mode -->
            <div class="filter-section-label">COMBINATION MODE</div>
            <div class="mode-radio-group" id="combination-mode-group">

                <label class="mode-radio">
                    <input type="radio" name="combination-mode" value="centroid" id="mode-centroid" checked>
                    <span class="mode-radio-content">
                        <span class="mode-symbol">ø</span>
                        <span class="mode-info">
                            <span class="mode-name">Barycentre</span>
                            <span class="mode-desc">Vibe général de tous les éléments</span>
                        </span>
                    </span>
                </label>

                <label class="mode-radio">
                    <input type="radio" name="combination-mode" value="intersection" id="mode-intersection">
                    <span class="mode-radio-content">
                        <span class="mode-symbol">∩</span>
                        <span class="mode-info">
                            <span class="mode-name">Intersection</span>
                            <span class="mode-desc">Points communs à tous (∩)</span>
                        </span>
                    </span>
                </label>

                <label class="mode-radio">
                    <input type="radio" name="combination-mode" value="union" id="mode-union">
                    <span class="mode-radio-content">
                        <span class="mode-symbol">∪</span>
                        <span class="mode-info">
                            <span class="mode-name">Union</span>
                            <span class="mode-desc">Ressemble à l’un d’eux (∪)</span>
                        </span>
                    </span>
                </label>

                <label class="mode-radio">
                    <input type="radio" name="combination-mode" value="pca" id="mode-pca">
                    <span class="mode-radio-content">
                        <span class="mode-symbol">≡</span>
                        <span class="mode-info">
                            <span class="mode-name">Composante commune</span>
                            <span class="mode-desc">Axe partagé entre les éléments (ACP)</span>
                        </span>
                    </span>
                </label>

                <label class="mode-radio">
                    <input type="radio" name="combination-mode" value="purified" id="mode-purified">
                    <span class="mode-radio-content">
                        <span class="mode-symbol">◎</span>
                        <span class="mode-info">
                            <span class="mode-name">Spécificité</span>
                            <span class="mode-desc">Ce qui est unique à la requête</span>
                        </span>
                    </span>
                </label>

            </div>
        </div>

        <!-- Filter button: visible after first search, top-right -->
        <button id="filter-btn" class="filter-btn" aria-label="Filtres" aria-expanded="false">
            <span class="filter-btn-icon">+</span>
        </button>
    </header>



    <main id="gallery" class="gallery">
        <!-- Images will be injected here -->
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
        <!-- Similar images strip (hidden when no cluster) -->
        <div id="lb-similaires" class="lb-similaires" aria-hidden="true">
            <span id="lb-sim-label" class="lb-sim-label"></span>
            <div id="lb-sim-strip" class="lb-sim-strip"></div>
        </div>
        <div class="lightbox-img-wrap">
            <img id="lightbox-img" src="" alt="">
        </div>
        <div class="lightbox-bar">
            <div class="lightbox-meta">
                <div id="lightbox-title"></div>
                <div class="lightbox-sub">
                    <span id="lightbox-author"></span>
                    <span id="lightbox-museum"></span>
                </div>
            </div>
            <div class="lightbox-actions">
                <button id="lightbox-pin" class="lb-pin-btn">PIN</button>
                <a id="lightbox-download" href="" download class="download-btn">DOWNLOAD</a>
            </div>
        </div>
        <button class="lightbox-close" aria-label="Fermer"></button>
    </div>
    <!-- Cluster group lightbox -->
    <div id="cluster-lightbox" class="cluster-lightbox" role="dialog" aria-modal="true">
        <div class="cluster-header">
            <button class="cluster-back" id="cluster-back" aria-label="Retour">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <span id="cluster-label" class="cluster-label"></span>
            <button class="lightbox-close cluster-close" aria-label="Fermer"></button>
        </div>
        <div id="cluster-grid" class="cluster-grid"></div>
    </div>
    <script src="app.js?v=13"></script>
</body>

</html>
